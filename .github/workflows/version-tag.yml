name: Version Tag

on:
  push:
    branches:
      - main
    paths:
      - 'assets/interface.json'

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '"version"' assets/interface.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG"
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        if: steps.version.outputs.version != steps.prev_tag.outputs.prev_tag && steps.prev_tag.outputs.prev_tag != ''
        run: |
          git tag ${{ format('v{0}', steps.version.outputs.version) }}
          git push origin ${{ format('v{0}', steps.version.outputs.version) }}

      - name: Create initial tag
        if: steps.prev_tag.outputs.prev_tag == ''
        run: |
          git tag ${{ format('v{0}', steps.version.outputs.version) }}
          git push origin ${{ format('v{0}', steps.version.outputs.version) }}
